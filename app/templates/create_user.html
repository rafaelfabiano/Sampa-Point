<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .Cadastro {
            width: 412px;
            height: auto; /* Ajusta a altura automaticamente */
            background: white;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
            position: relative;
            padding: 20px;
        }
        .Rectangle {
            width: 371px;
            height: 39px;
            background: #D9D9D9;
            border-radius: 22px;
            margin: 10px 0;
        }
        label {
            font-size: 20px;
            color: black;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 5px 0 15px 0;
            border: 1px solid #D9D9D9;
            border-radius: 22px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #FE0000;
            color: white;
            border: none;
            border-radius: 22px;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
            margin-top: 10px;
        }
        button:hover {
            background: #d60000;
        }
        .flash-messages {
            list-style: none;
            padding: 0;
            margin: 10px 0;
        }
        .flash-success {
            color: green;
        }
        .flash-error {
            color: red;
        }
    </style>
</head>
<body>
    <!-- Navbar fixa -->
    <nav class="navbar">
        <div class="logo">
            <h1><a href="{{ url_for('user_routes.dashboard') }}">Logo</a></h1>
        </div>
        <ul class="nav-links">
            <!-- Links da Navbar -->
        </ul>
    </nav>

    <!-- Conteúdo principal -->
    <div class="main-container">
        <div class="Cadastro">
            <h2 style="text-align: center;">Cadastre-se</h2>

            <!-- Exibir mensagens flash de sucesso ou erro -->
            {% with messages = get_flashed_messages(with_categories=True) %}
                {% if messages %}
                    <ul class="flash-messages">
                        {% for category, message in messages %}
                            <li class="flash-{{ category }}">{{ message }}</li>
                        {% endfor %}
                    </ul>
                {% endif %}
            {% endwith %}

            <!-- Formulário de criação de usuário -->
            <form action="{{ url_for('user_routes.create_user_route') }}" method="POST">
                <div class="Rectangle"></div>
                <label for="first_name">Nome:</label>
                <input type="text" id="first_name" name="first_name" required>

                <label for="nascimento">Data de Nascimento:</label>
                <input type="text" id="nascimento" name="nascimento" required>
                
                <label for="celular">Celular:</label>
                <input type="text" id="celular" name="celular" required>

                <label for="bairro">Bairro:</label>
                <input type="text" id="bairro" name="bairro" required>
                
                <label for="cidade">Cidade:</label>
                <input type="text" id="cidade" name="cidade" required>

                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" required>

                <label for="password">Senha:</label>
                <input type="password" id="password" name="password" required>

                <button type="submit">Cadastrar</button>
            </form>
        </div>
    </div>
</body>
</html>
